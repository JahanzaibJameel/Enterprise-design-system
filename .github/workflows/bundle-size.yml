name: Bundle Size Governance

on:
  pull_request:
    branches: [ main ]

jobs:
  bundle-size:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci --legacy-peer-deps
      
    - name: Build for production
      run: npx expo export --platform web --output-dir dist-web
      
    - name: Check bundle size
      run: |
        # Size limits (in KB)
        JS_LIMIT=500
        CSS_LIMIT=100
        TOTAL_LIMIT=800
        
        # Get actual sizes
        JS_SIZE=$(find dist-web -name "*.js" -exec du -k {} + | awk '{sum+=$1} END {print sum}')
        CSS_SIZE=$(find dist-web -name "*.css" -exec du -k {} + | awk '{sum+=$1} END {print sum}')
        TOTAL_SIZE=$(du -sk dist-web | awk '{print $1}')
        
        echo "JavaScript: ${JS_SIZE}KB (limit: ${JS_LIMIT}KB)"
        echo "CSS: ${CSS_SIZE}KB (limit: ${CSS_LIMIT}KB)"
        echo "Total: ${TOTAL_SIZE}KB (limit: ${TOTAL_LIMIT}KB)"
        
        # Fail if over limits
        if [ "$JS_SIZE" -gt "$JS_LIMIT" ]; then
          echo "❌ JavaScript bundle too large: ${JS_SIZE}KB > ${JS_LIMIT}KB"
          exit 1
        fi
        
        if [ "$CSS_SIZE" -gt "$CSS_LIMIT" ]; then
          echo "❌ CSS bundle too large: ${CSS_SIZE}KB > ${CSS_LIMIT}KB"
          exit 1
        fi
        
        if [ "$TOTAL_SIZE" -gt "$TOTAL_LIMIT" ]; then
          echo "❌ Total bundle too large: ${TOTAL_SIZE}KB > ${TOTAL_LIMIT}KB"
          exit 1
        fi
        
        echo "✅ All bundle sizes within limits"
