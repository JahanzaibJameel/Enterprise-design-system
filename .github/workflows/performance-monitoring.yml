name: Performance Monitoring

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *' # Daily at 2 AM

jobs:
  performance-monitoring:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci --legacy-peer-deps
      
    - name: Build for performance testing
      run: |
        npx expo export --platform web --output-dir dist-web
        
    - name: Core Web Vitals
      run: |
        echo "📊 Testing Core Web Vitals..."
        
        # Install web-vitals
        npm install web-vitals
        
        # Run performance tests
        node scripts/performance-test.mjs
        
    - name: React Native Performance
      run: |
        echo "📱 Testing React Native performance..."
        
        # Run RN performance profiler
        node scripts/rn-performance-test.mjs
        
    - name: Bundle Performance
      run: |
        echo "📦 Analyzing bundle performance..."
        
        # Check bundle loading performance
        npx webpack-bundle-analyzer dist-web/static/js/*.js --mode=json --report=bundle-performance.json
        
        # Check for performance issues
        node scripts/bundle-performance-check.mjs
        
    - name: Memory Usage Analysis
      run: |
        echo "🧠 Analyzing memory usage..."
        
        # Memory leak detection
        node scripts/memory-analysis.mjs
        
    - name: Performance Regression Detection
      run: |
        echo "📈 Detecting performance regressions..."
        
        # Compare with baseline performance
        if [ -f "performance-baseline.json" ]; then
          node scripts/performance-regression.mjs
        else
          echo "📝 Creating performance baseline..."
          cp performance-current.json performance-baseline.json
        fi
        
    - name: Performance Report
      run: |
        echo "📊 Generating performance report..."
        
        # Generate comprehensive report
        node scripts/generate-performance-report.mjs
        
    - name: Upload performance artifacts
uses: actions/upload-artifact@v4
with:
        name: performance-reports
        path: |
          performance-*.json
          bundle-performance.json
          performance-report.html
