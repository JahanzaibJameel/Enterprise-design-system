name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint
      
      - name: Check TypeScript types
        run: npx tsc --noEmit

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run unit tests
        run: npm test -- --coverage --watchAll=false
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage/lcov.info

  token-validation:
    name: Validate Tokens
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Generate tokens from JSON
        run: node scripts/generate-tokens.js
      
      - name: Check for token drift
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "❌ Token drift detected! Please run 'npm run generate-tokens' and commit the changes."
            exit 1
          else
            echo "✅ Tokens are in sync"
          fi
      
      - name: Validate token completeness
        run: node scripts/validate-tokens.js

  theme-isolation:
    name: Test Theme Isolation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Test theme switching
        run: node scripts/test-theme-isolation.js

  performance:
    name: Performance Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Check bundle size
        run: node scripts/check-bundle-size.js
      
      - name: Run performance benchmarks
        run: node scripts/performance-benchmark.js

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: [lint, test, token-validation, theme-isolation, performance]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build for web
        run: npm run expo:static:build
      
      - name: Build for native
        run: npx expo export --platform all

  accessibility:
    name: Accessibility Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run accessibility tests
        run: npm run test:a11y
      
      - name: Check WCAG contrast ratios
        run: node scripts/check-contrast.js

  deploy:
    name: Deploy to Preview
    runs-on: ubuntu-latest
    needs: [build, accessibility]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Deploy to Expo Preview
        run: npx expo export --platform web && echo "Deploy to preview environment"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
