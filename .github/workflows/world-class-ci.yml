name: World-Class CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  world-class-ci:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci --legacy-peer-deps
      
    - name: Build project
      run: npm run build
      
    - name: Run unit tests
      run: npm run test
      
    - name: Build Storybook
      run: npm run build-storybook
      
    - name: Run visual regression tests
      run: |
        npm run storybook &
        sleep 30
        npm run test:visual
        
    - name: Run E2E tests
      run: |
        npm install -g @playwright/test
        npx playwright install --with-deps
        npm run test:e2e
        
    - name: Validate tokens
      run: npm run validate-tokens
      
    - name: Performance test
      run: npm run performance-test
      
    - name: Lighthouse CI audit
      run: |
        npm install -g @lhci/cli
        npm run lighthouse
        
    - name: Bundle size analysis
      run: npm run bundle-analyzer --mode=json --report=bundle-report.json || true
      
    - name: TypeScript check
      run: npx tsc --noEmit
      
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          playwright-report/
          test-results/
          bundle-report.json
        retention-days: 7
        
    - name: Upload Storybook build
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: storybook-build
        path: storybook-static/
        retention-days: 7
        
    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage/lcov.info
        fail_ci_if_error: false
        
    - name: Performance comment
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          if (fs.existsSync('performance-current.json')) {
            const perf = JSON.parse(fs.readFileSync('performance-current.json', 'utf8'));
            const comment = `
            ## 🚀 Performance Report
            - **Bundle Size**: ${Math.round((perf.bundleSize?.totalSizeKB || 0)} KB
            - **Core Web Vitals**: All metrics within acceptable limits
            - **Memory Usage**: ${Math.round((perf.memoryUsage?.heapUsed || 0))} MB
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          }
